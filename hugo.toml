baseurl = "https://www.frxiaobei.com"
title = "凡人小北 · 转角处"
theme = ["elyfinn", "PaperMod"]
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
pagerSize = 10

[minify]
disableXML = true
minifyOutput = true

[params]
googleAnalyticsID = "G-PEVTF8NDTP"
env = "production"
author = "凡人小北"
description = "每一个转角，都是遇见下一条路的开始。在转角处，写下关于AI、思考与拐点的故事。"
keywords = ["blog", "AI", "agent", "凡人小北", "frxiaobei"]
images = ["/images/og-default.png"]
defaultTheme = "auto"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = true
hidemeta = false
hideSummary = false
ShowToc = true
TocOpen = false

  [params.footer]
  text = "[Elyfinn](https://elyfinn.com)"

  [params.assets]
  favicon = "/img/favicon-16x16.png"
  favicon16x16 = "/img/favicon-16x16.png"
  favicon32x32 = "/img/favicon-32x32.png"
  apple_touch_icon = "/img/favicon-32x32.png"

  [params.label]
  text = "凡人小北 · Elyfinn"
  icon = "/images/elyfinn-fox.png"
  iconHeight = 36

  [params.profileMode]
  enabled = false

  [params.homeInfoParams]
  Title = "👋 你好，我是凡人小北"
  Content = "AI 创作者、产品探索者。和我的 AI 合伙人 [凡哥](https://elyfinn.com) 一起，探索人机协作的新可能。"

  [[params.socialIcons]]
  name = "elyfinn"
  url = "https://elyfinn.com"

  [[params.socialIcons]]
  name = "x"
  url = "https://x.com/frxiaobei"

  [[params.socialIcons]]
  name = "github"
  url = "https://github.com/frxiaobei"

  [[params.socialIcons]]
  name = "threads"
  url = "https://www.threads.com/@frxiaobei"

  [[params.socialIcons]]
  name = "xiaohongshu"
  url = "https://www.xiaohongshu.com/user/profile/6726d28b000000001c01b8a8"

  [[params.socialIcons]]
  name = "weixin"
  url = "#wechat-qr"

  [[params.socialIcons]]
  name = "rss"
  url = "index.xml"

[params.cover]
hidden = false
hiddenInList = false
hiddenInSingle = false

[params.giscus]
repo = "frxiaobei/frxiaobei-comments"
repoID = "R_kgDOQJ_6ng"
category = "Announcements"
categoryID = "DIC_kwDOQJ_6ns4CxH-e"
mapping = "pathname"
strict = "0"
reactionsEnabled = "1"
emitMetadata = "0"
inputPosition = "bottom"
theme = "preferred_color_scheme"
lang = "zh-CN"
loading = "lazy"

[params.googleTagManager]
