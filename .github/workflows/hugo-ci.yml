name: Hugo CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: hugo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Hugo site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.7"
          extended: true

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --minify --cleanDestinationDir

      - name: Verify AdSense files
        run: |
          test -f public/ads.txt
          grep -q "google.com, pub-2475915786956057, DIRECT, f08c47fec0942fa0" public/ads.txt
          grep -q "google-adsense-account" public/index.html
          grep -q "ca-pub-2475915786956057" public/index.html
