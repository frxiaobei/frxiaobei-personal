name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy Hugo site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.7"
          extended: true

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --minify --cleanDestinationDir

      - name: Verify AdSense files
        run: |
          test -f public/ads.txt
          grep -q "google.com, pub-2475915786956057, DIRECT, f08c47fec0942fa0" public/ads.txt
          grep -q "google-adsense-account" public/index.html
          grep -q "ca-pub-2475915786956057" public/index.html

      - name: Verify Cloudflare token
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            echo "Create a Cloudflare API token with Cloudflare Pages edit permissions, then add it to this repository's Actions secrets."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 75e4b27ab9638bc22290cafc1fd6b5f6
          command: pages deploy public --project-name=frxiaobei-personal --branch=main
