<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>道 - 凡人小北</title>
    <meta name="description" content="dao.frxiaobei.com - 极简道家主题着陆页" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.7.0/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PEVTF8NDTP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PEVTF8NDTP');
    </script>
  </head>
  <body>
    <main>
      <section class="hero" aria-label="首屏">
        <div class="hero__veil"></div>
        <div class="hero__content">
          <div class="hero__title" aria-hidden="true">道</div>
          <div class="hero__subtitle">知者不言，言者不知</div>
          
          <div class="daily-quote" id="dailyQuote">
            <div class="daily-quote__text" id="quoteText">加载中...</div>
            <div class="daily-quote__source" id="quoteSource"></div>
            <div class="daily-quote__full" id="quoteFull"></div>
            <div class="daily-quote__hint">轻触感悟</div>
          </div>
          
          <a class="daily-quote__link" href="daodejing/">
            阅读道德经全文
            <svg style="margin-left: 8px;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </a>
        </div>
        <div class="hero__scroll">↓</div>
      </section>

      <section class="section" aria-label="关于道">
        <div class="section__inner">
          <h2 style="animation: slideUp 0.8s var(--ease) both;">关于道</h2>
          <div class="prose" style="animation: slideUp 1s var(--ease) both;">
            <p>老子说“知者不博，博者不知”</p>
            <p>庄子说“吾生也有涯，而知也无涯”</p>
            <p>我信这个。</p>
            <p>不追热点，不贪多，不焦虑没学完的东西。</p>
            <p>找到值得做的，做透。其他的，随缘。</p>
          </div>
        </div>
      </section>

      <section class="section" aria-label="修行">
        <div class="section__inner">
          <h2 style="animation: slideUp 0.8s var(--ease) both;">修行</h2>
          <div class="prose" style="animation: slideUp 1s var(--ease) both;">
            <p>日常会打坐，偶尔读经。</p>
            <p>不是玄学，是让自己静下来的方式。</p>
            <p>在这个加速的时代，</p>
            <p>慢下来，反而是一种能力。</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <a class="footer__link" href="https://frxiaobei.com">← frxiaobei.com</a>
      <div class="footer__copy">© 凡人小北 · 2025</div>
    </footer>

    <script>
      // 每日一句道德经
      (function() {
        const quoteEl = document.getElementById('dailyQuote');
        const textEl = document.getElementById('quoteText');
        const sourceEl = document.getElementById('quoteSource');
        const fullEl = document.getElementById('quoteFull');
        
        function getDayOfYear() {
          const now = new Date();
          const start = new Date(now.getFullYear(), 0, 0);
          const diff = now - start;
          const oneDay = 1000 * 60 * 60 * 24;
          return Math.floor(diff / oneDay);
        }
        
        fetch('daodejing.json')
          .then(r => r.json())
          .then(data => {
            const index = getDayOfYear() % data.length;
            const item = data[index];
            
            textEl.textContent = '「' + item.quote + '」';
            sourceEl.textContent = '—— 第 ' + item.chapter + ' 章';
            fullEl.textContent = item.full;
            
            quoteEl.addEventListener('click', function() {
              quoteEl.classList.toggle('expanded');
            });
          })
          .catch(e => {
            textEl.textContent = '道可道，非常道。';
            sourceEl.textContent = '—— 道德经';
          });
      })();
    </script>
  </body>
</html>
