<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>道德经 · 全文 - 转角处</title>
    <meta name="description" content="道德经八十一章原文全文阅读" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.7.0/style.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css" />
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PEVTF8NDTP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PEVTF8NDTP');
    </script>
    <style>
      /* Page-specific overrides or additions */
      body::before {
        content: '';
        position: fixed;
        bottom: 0;
        right: 0;
        width: 400px;
        height: 400px;
        background-image: url('laozi-watermark.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: bottom right;
        opacity: 0.03;
        pointer-events: none;
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="topbar__back" href="../">← 返回「道」</a>
        <div class="topbar__title">道德经</div>
        <a class="topbar__home" href="https://frxiaobei.com">转角处</a>
      </div>
    </header>

    <main class="reader">
      <aside class="reader__side">
        <nav class="toc">
          <div class="toc__title">目录 · 八十一章</div>
          <div class="toc__grid" id="tocGrid"></div>
        </nav>
      </aside>

      <article class="reader__content" id="content">
        <!-- Chapters will be loaded here -->
      </article>
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <a class="footer__link" href="../">← 返回「道」</a>
        <div class="footer__copy">© 凡人小北 · 道德经全文阅读</div>
      </div>
    </footer>

    <a class="back-top" id="backTop" href="#">↑</a>

    <script>
      const tocGrid = document.getElementById('tocGrid');
      const content = document.getElementById('content');
      const backTop = document.getElementById('backTop');

      // 加载数据
      fetch('../daodejing.json')
        .then(r => r.json())
        .then(data => {
          data.sort((a, b) => a.chapter - b.chapter).forEach(item => {
            const id = 'ch' + item.chapter;
            
            // TOC Item
            const a = document.createElement('a');
            a.className = 'toc__item';
            a.href = '#' + id;
            a.id = 'toc-' + id;
            a.textContent = item.chapter;
            tocGrid.appendChild(a);
            
            // Chapter Content
            const section = document.createElement('section');
            section.className = 'chapter';
            section.id = id;
            
            // Split by punctuation for better reading flow
            const paragraphs = item.full
              .split(/(?<=[。！？])\s*/)
              .filter(p => p.trim())
              .map(p => `<p>${p}</p>`)
              .join('');
            
            section.innerHTML = `
              <h2 class="chapter__title">第 ${item.chapter} 章</h2>
              <div class="chapter__text">${paragraphs}</div>
            `;
            
            content.appendChild(section);
          });

          // Intersection Observer for TOC highlighting
          const observerOptions = {
            root: null,
            rootMargin: '-10% 0px -80% 0px',
            threshold: 0
          };

          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                // Remove active class from all
                document.querySelectorAll('.toc__item').forEach(el => el.classList.remove('active'));
                // Add to current
                const activeId = 'toc-' + entry.target.id;
                const activeEl = document.getElementById(activeId);
                if (activeEl) {
                  activeEl.classList.add('active');
                  // Optional: scroll TOC into view if it's too long
                  // activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
              }
            });
          }, observerOptions);

          document.querySelectorAll('.chapter').forEach(chapter => observer.observe(chapter));
        });

      // Back to top button visibility
      window.addEventListener('scroll', () => {
        backTop.classList.toggle('visible', window.scrollY > 600);
      });
    </script>
  </body>
</html>
